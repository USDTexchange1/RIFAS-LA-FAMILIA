<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LA FAMILIA - Lector QR Inteligente</title>

<!-- LIBRERÍA QR ESTABLE -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#020617;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow:hidden;
color:white;
}

.container{
width:100%;
max-width:520px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,0.08);
padding:25px;
border-radius:25px;
box-shadow:0 0 40px rgba(0,0,0,0.6);
text-align:center;
position:relative;
}

.title{
font-size:46px;
font-weight:bold;
margin-bottom:10px;
background:linear-gradient(
90deg,
#22c55e,
#06b6d4,
#3b82f6,
#22c55e
);
background-size:300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:shine 5s linear infinite;
}

@keyframes shine{
0%{background-position:0%;}
100%{background-position:300%;}
}

.subtitle{
font-size:15px;
opacity:0.8;
margin-bottom:25px;
}

#reader{
display:none;
overflow:hidden;
border-radius:20px;
border:2px solid rgba(255,255,255,0.1);
margin-top:15px;
}

.btn{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:15px;
font-size:17px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.start-btn{
background:linear-gradient(
90deg,
#22c55e,
#16a34a
);
color:white;
}

.stop-btn{
background:linear-gradient(
90deg,
#ef4444,
#dc2626
);
color:white;
display:none;
}

.btn:hover{
transform:scale(1.02);
}

.loading{
display:none;
margin-top:25px;
}

.spinner{
width:60px;
height:60px;
margin:auto;
border-radius:50%;
border:6px solid rgba(255,255,255,0.2);
border-top:6px solid #22c55e;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.loading-text{
margin-top:12px;
font-size:18px;
font-weight:bold;
}

.notification{
position:fixed;
top:25px;
left:50%;
transform:translateX(-50%);
padding:18px 25px;
border-radius:18px;
font-weight:bold;
font-size:16px;
display:none;
z-index:9999;
max-width:90%;
text-align:center;
animation:show 0.4s ease;
}

@keyframes show{
from{
opacity:0;
transform:translate(-50%,-40px);
}
to{
opacity:1;
transform:translate(-50%,0);
}
}

.win{
background:#16a34a;
box-shadow:0 0 25px rgba(34,197,94,0.8);
}

.lose{
background:#dc2626;
box-shadow:0 0 25px rgba(239,68,68,0.8);
}

.invalid{
background:#f59e0b;
box-shadow:0 0 25px rgba(245,158,11,0.8);
}

.footer{
margin-top:25px;
font-size:13px;
opacity:0.6;
}

.confetti{
position:fixed;
width:10px;
height:10px;
top:-10px;
animation:fall linear forwards;
z-index:999;
}

@keyframes fall{
to{
transform:translateY(100vh) rotate(720deg);
opacity:0;
}
}

</style>
</head>

<body>

<div class="notification" id="notification"></div>

<div class="container">

<div class="title">
LA FAMILIA
</div>

<div class="subtitle">
Sistema Inteligente de Rifas QR
</div>

<button class="btn start-btn" onclick="startScanner()">
📷 Activar lector QR
</button>

<button class="btn stop-btn" id="stopBtn" onclick="stopScanner()">
❌ Detener lector
</button>

<div id="reader"></div>

<div class="loading" id="loading">

<div class="spinner"></div>

<div class="loading-text">
Calculando resultado...
</div>

</div>

<div class="footer">
© La Familia - Sistema Premium QR
</div>

</div>

<script>

let scanner = null;

// ==========================
// URL GANADOR
// ==========================

const redirectUrl =
"https://lafamilia01.wordpress.com/rifas-la-familia/";

// ==========================
// PALABRAS GANADORAS
// ==========================

const winnerKeywords = [

"ganador",
"ganaste",
"premio",
"winner",
"felicidades",
"has ganado",
"victoria",
"jackpot",
"eres ganador",
"premio vip",
"mega premio",
"big winner",
"you win",
"lucky"

];

// ==========================
// PALABRAS PERDEDORAS
// ==========================

const loserKeywords = [

"perdedor",
"perdiste",
"sin suerte",
"lose",
"loser",
"try again",
"bad luck",
"fallaste",
"sin premio",
"game over"

];

// ==========================
// INICIAR ESCÁNER
// ==========================

function startScanner(){

document.getElementById("reader").style.display = "block";
document.getElementById("stopBtn").style.display = "block";

scanner = new Html5Qrcode("reader");

scanner.start(

{
facingMode: "environment"
},

{
fps:10,
qrbox:{
width:250,
height:250
},
aspectRatio:1
},

(decodedText)=>{

onScanSuccess(decodedText);

},

(errorMessage)=>{

// ignorar errores
}

).catch(err=>{

console.log(err);

showNotification(
"⚠ Error al iniciar cámara",
"invalid"
);

});

}

// ==========================
// DETENER ESCÁNER
// ==========================

function stopScanner(){

if(scanner){

scanner.stop().then(()=>{

document.getElementById("reader").style.display = "none";
document.getElementById("stopBtn").style.display = "none";

}).catch(err=>{

console.log(err);

});

}

}

// ==========================
// ESCANEO EXITOSO
// ==========================

function onScanSuccess(decodedText){

navigator.vibrate?.(300);

stopScanner();

document.getElementById("loading").style.display="block";

setTimeout(()=>{

document.getElementById("loading").style.display="none";

const code = decodedText
.toLowerCase()
.trim();

console.log("Código leído:", code);

// ==========================
// DETECTAR GANADOR
// ==========================

const isWinner = winnerKeywords.some(
word => code.includes(word)
);

// ==========================
// DETECTAR PERDEDOR
// ==========================

const isLoser = loserKeywords.some(
word => code.includes(word)
);

// ==========================
// GANADOR
// ==========================

if(isWinner){

playWinSound();

launchConfetti();

showNotification(
"🎉 FELICIDADES 🎉<br>ERES GANADOR OFICIAL",
"win"
);

setTimeout(()=>{

window.location.href = redirectUrl;

},4000);

}

// ==========================
// PERDEDOR
// ==========================

else if(isLoser){

playLoseSound();

showNotification(
"😢 No tuviste suerte esta vez.<br>Prueba nuevamente.",
"lose"
);

setTimeout(()=>{

startScanner();

},4000);

}

// ==========================
// DESCONOCIDO
// ==========================

else{

showNotification(
"⚠ QR desconocido o no válido",
"invalid"
);

setTimeout(()=>{

startScanner();

},4000);

}

},3000);

}

// ==========================
// NOTIFICACIÓN
// ==========================

function showNotification(message,type){

const notification =
document.getElementById("notification");

notification.innerHTML = message;

notification.className =
"notification " + type;

notification.style.display = "block";

setTimeout(()=>{

notification.style.display = "none";

},5000);

}

// ==========================
// SONIDO GANADOR
// ==========================

function playWinSound(){

const audio = new Audio(
"https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3"
);

audio.play();

}

// ==========================
// SONIDO PERDEDOR
// ==========================

function playLoseSound(){

const audio = new Audio(
"https://assets.mixkit.co/sfx/preview/mixkit-player-losing-or-failing-2042.mp3"
);

audio.play();

}

// ==========================
// CONFETI
// ==========================

function launchConfetti(){

for(let i=0;i<150;i++){

const confetti =
document.createElement("div");

confetti.classList.add("confetti");

confetti.style.left =
Math.random()*100 + "vw";

confetti.style.background =
`hsl(${Math.random()*360},100%,50%)`;

confetti.style.animationDuration =
(Math.random()*3+2)+"s";

document.body.appendChild(confetti);

setTimeout(()=>{

confetti.remove();

},5000);

}

}

</script>

</body>
  </html>
